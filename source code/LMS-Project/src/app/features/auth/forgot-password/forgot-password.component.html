<div class="auth-wrapper" dir="ltr">
  <div class="mesh-gradient"></div>

  <div class="glass-card">
    
    <div *ngIf="!isEmailSent" class="fade-in">
      <div class="text-center mb-4">
        <div class="logo-glow">
          <i class="bi bi-shield-lock text-white" style="font-size: 3.5rem;"></i>
        </div>
        <h2 class="fw-bold text-white mt-3 mb-1">Forgot Password?</h2>
        <p class="text-white-50 small px-3">Enter your email and we'll send you a link to reset your password.</p>
      </div>

      <form [formGroup]="forgotPasswordForm" (ngSubmit)="sendResetLink()">
        <div class="mb-4">
          <label class="form-label text-white-50 small">Email Address</label>
          <div class="input-group">
            <span class="input-group-text glass-input-icon"><i class="bi bi-envelope"></i></span>
            <input type="email" formControlName="email" class="form-control glass-input" 
                   placeholder="name@example.com"
                   [class.is-invalid]="forgotPasswordForm.get('email')?.invalid && forgotPasswordForm.get('email')?.touched">
          </div>
          <div class="invalid-feedback" *ngIf="forgotPasswordForm.get('email')?.invalid && forgotPasswordForm.get('email')?.touched">
            Please enter a valid email address.
          </div>
        </div>

        <button type="submit" class="btn btn-login-grad w-100 py-3 mb-4">
          Send Reset Link <i class="bi bi-send ms-2"></i>
        </button>

        <div class="text-center">
          <a routerLink="/login" class="text-white-50 small text-decoration-none hover-white">
            <i class="bi bi-arrow-left me-1"></i> Back to Login
          </a>
        </div>
      </form>
    </div>

    <div *ngIf="isEmailSent" class="text-center fade-in py-4">
      <div class="logo-glow mb-4">
        <i class="bi bi-check2-circle text-white" style="font-size: 4.5rem;"></i>
      </div>
      <h2 class="fw-bold text-white">Email Sent!</h2>
      <p class="text-white-50 mt-3 px-2">
        We've sent a password reset link to <strong>{{forgotPasswordForm.get('email')?.value}}</strong>.
      </p>
      <div class="alert alert-info bg-transparent border-info text-info small my-4">
        Link expires in 1 hour. Check your spam folder if you don't see it.
      </div>
      <button routerLink="/login" class="btn btn-login-grad w-100 py-3">
        Back to Login
      </button>
    </div>

  </div>
</div>
