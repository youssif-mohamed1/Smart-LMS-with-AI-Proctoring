<div class="auth-wrapper" dir="ltr">
  <div class="mesh-gradient"></div>

  <div class="glass-card">
    <div class="text-center mb-4">
      <h2 class="fw-bold text-white mt-3 mb-1">Lumina</h2>
      <p class="text-white-50 small px-3">Illuminating Education, Intelligently Secured</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
      
      <div class="mb-3">
        <label class="form-label text-white-50 small">Email Address</label>
        <div class="input-group">
          <span class="input-group-text glass-input-icon"><i class="bi bi-envelope"></i></span>
          <input type="email" formControlName="email" class="form-control glass-input" 
                 placeholder="name@example.com"
                 [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
        </div>
        <div class="invalid-feedback" *ngIf="loginForm.get('email')?.errors?.['email'] && loginForm.get('email')?.touched">
          Please enter a valid email address.
        </div>
      </div>

      <div class="mb-2">
        <label class="form-label text-white-50 small">Password</label>
        <div class="input-group">
          <span class="input-group-text glass-input-icon"><i class="bi bi-lock"></i></span>
          <input type="password" formControlName="password" class="form-control glass-input" 
                 placeholder="••••••••"
                 [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        </div>
        
        <div class="d-flex justify-content-end mt-2">
          <a routerLink="/forget-password" class="text-white-50 small text-decoration-none hover-white">
            Forgot Password?
          </a>
        </div>
      </div>

      <button type="submit" class="btn btn-login-grad w-100 py-3 mb-4 mt-3">
        Sign In <i class="bi bi-arrow-right ms-2"></i>
      </button>

      <div class="text-center">
        <span class="text-white-50 small">Don't have an account?</span>
        <a routerLink="/register" class="text-white fw-bold text-decoration-none small ms-2">Create Account</a>
      </div>
    </form>
  </div>
</div>
