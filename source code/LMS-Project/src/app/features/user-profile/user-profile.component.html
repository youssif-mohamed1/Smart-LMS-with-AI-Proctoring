<div class="row g-3 fade-in flex-column">
    <div class="col-12">
        <div class="glass-card p-4 text-center h-100">
            <div class="profile-img-container mb-3 position-relative">
                <img [src]="userProfile?.profilePictureUrl || 'assets/hero-vector.png'" alt="Profile Picture"
                    class="img-fluid shadow">

                <label for="fileUpload" class="edit-photo-btn">
                    <i class="bi bi-camera-fill"></i>
                </label>
                <input type="file" id="fileUpload" (change)="onFileSelected($event)" hidden accept="image/*">
            </div>

            <h4 class="text-white fw-bold mb-1">{{userProfile?.firstName}} {{userProfile?.lastName}}</h4>
            <p class="text-white-50 small mb-3">{{userProfile?.email}}</p>

            <div class="d-flex justify-content-center gap-2 mb-4">
                <span class="badge rounded-pill bg-info text-dark px-3 py-2">
                    {{ userProfile?.academicYear ? (userProfile.academicYear + ' Year') : 'General / Staff' }}
                </span>
            </div>

            <button *ngIf="hasPermission('Profile:levelUp')" class="btn btn-levelup w-100 py-2"
                (click)="handleLevelUp()">
                Level Up Academic Year <i class="bi bi-arrow-up-circle ms-1"></i>
            </button>
        </div>
    </div>

    <div class="col-12">
        <div class="glass-card p-3 h-100">

            <div class="action-section mb-3">
                <button class="btn w-100 py-3 d-flex justify-content-between align-items-center"
                    [class.btn-info-active]="activeTab === 'info'" [class.btn-outline-info]="activeTab !== 'info'"
                    (click)="activeTab = activeTab === 'info' ? null : 'info'">
                    <span><i class="bi bi-person-gear me-2"></i>Edit Profile Information</span>
                    <i class="bi" [ngClass]="activeTab === 'info' ? 'bi-chevron-up' : 'bi-chevron-down'"></i>
                </button>

                <div class="expand-content" [class.show]="activeTab === 'info'">
                    <form [formGroup]="profileForm" (ngSubmit)="updateInfo()" class="p-3 bg-white rounded-bottom">
                        <div class="d-flex flex-column gap-2">
                            <div class="text-start">
                                <label class="form-label small fw-bold text-muted">First Name</label>
                                <input type="text" formControlName="firstName" class="form-control glass-input">
                            </div>
                            <div class="text-start">
                                <label class="form-label small fw-bold text-muted">Last Name</label>
                                <input type="text" formControlName="lastName" class="form-control glass-input">
                            </div>
                            <div class="text-start">
                                <label class="form-label small fw-bold text-muted">Date of Birth</label>
                                <input type="date" formControlName="dateOfBirth" class="form-control glass-input">
                            </div>
                            <div class="text-start" *ngIf="hasPermission('Profile:levelUp')">
                                <label class="form-label small fw-bold text-muted">Academic Year</label>
                                <select formControlName="academicYear" class="form-control glass-input">
                                    <option value="First">First</option>
                                    <option value="Second">Second</option>
                                    <option value="Third">Third</option>
                                    <option value="Fourth">Fourth</option>
                                    <option value="Fifth">Fifth</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-login-grad w-100 mt-3" [disabled]="profileForm.invalid">
                            Save Changes
                        </button>
                    </form>
                </div>
            </div>

            <div class="action-section">
                <button class="btn w-100 py-3 d-flex justify-content-between align-items-center"
                    [class.btn-info-active]="activeTab === 'password'"
                    [class.btn-outline-info]="activeTab !== 'password'"
                    (click)="activeTab = activeTab === 'password' ? null : 'password'">
                    <span><i class="bi bi-shield-lock me-2"></i>Change Security Key</span>
                    <i class="bi" [ngClass]="activeTab === 'password' ? 'bi-chevron-up' : 'bi-chevron-down'"></i>
                </button>

                <div class="expand-content" [class.show]="activeTab === 'password'">
                    <form [formGroup]="passwordForm" (ngSubmit)="updatePassword()"
                        class="p-3 bg-light rounded-bottom border-top-0">
                        <div class="mb-2 text-start">
                            <label class="form-label small fw-bold">Current Password</label>
                            <input type="password" formControlName="currentPassword" class="form-control glass-input">
                        </div>
                        <div class="mb-2 text-start">
                            <label class="form-label small fw-bold">New Password</label>
                            <input type="password" formControlName="newPassword" class="form-control glass-input"
                                [class.is-invalid]="passwordForm.get('newPassword')?.invalid && passwordForm.get('newPassword')?.touched">
                            <div class="invalid-feedback">
                                Password must be 8+ characters with uppercase, lowercase, number, and special character.
                            </div>
                        </div>
                        <button type="submit" class="btn btn-login-grad w-100 mt-2" [disabled]="passwordForm.invalid">
                            Update Password
                        </button>
                    </form>
                </div>
            </div>
            <div class="logout-container">
                <button class="btn btn-logout-drawer" (click)="onLogout()">
                    <i class="bi bi-box-arrow-right me-2"></i> Logout
                </button>
            </div>
        </div>
    </div>
</div>
