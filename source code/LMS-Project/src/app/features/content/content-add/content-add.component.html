<!-- ============================================================
     Add Content Modal — content-add.component.html
     Stitch reference: stitch-designs/content-add/screen.png
     ============================================================ -->

<!-- ── Modal Header ─────────────────────────────────────────── -->
<div class="modal-header content-add-header">
  <h5 class="modal-title mb-0" id="contentAddModalLabel">Add New Content</h5>
  <button type="button" class="btn-close-modal"
          aria-label="Close"
          [disabled]="isSubmitting"
          (click)="cancel()">
    <i class="bi bi-x-lg"></i>
  </button>
</div>

<!-- ── Modal Body ────────────────────────────────────────────── -->
<div class="modal-body p-4">

  <!-- Error / Retry Alert -->
  <div *ngIf="submitError" class="alert alert-danger d-flex align-items-start gap-2 mb-4" role="alert">
    <i class="bi bi-exclamation-triangle-fill fs-5 mt-1"></i>
    <div class="flex-grow-1">
      <strong>{{ retryMode ? 'Attachment Upload Failed' : 'Could Not Create Content' }}</strong>
      <div class="small mt-1">{{ submitError }}</div>
    </div>
    <button *ngIf="retryMode"
            class="btn btn-sm btn-outline-danger fw-semibold ms-2"
            id="btn-retry-upload"
            (click)="retryUpload()">
      <i class="bi bi-arrow-clockwise me-1"></i>Retry Upload
    </button>
  </div>

  <!-- MODULE TITLE -->
  <div class="mb-4">
    <label for="content-title" class="form-label field-label">TITLE</label>
    <input type="text"
           class="form-control form-control-lg rounded-3"
           [class.is-invalid]="titleInput.invalid && titleInput.touched"
           id="content-title"
           name="title"
           #titleInput="ngModel"
           required
           placeholder="e.g. Week 1 - Introduction"
           [(ngModel)]="title"
           [disabled]="isSubmitting"
           autocomplete="off">
    <div class="invalid-feedback text-danger small mt-1" *ngIf="titleInput.invalid && titleInput.touched">
      This field is required.
    </div>
  </div>

  <!-- DESCRIPTION / BODY CONTENT -->
  <div class="mb-4">
    <label for="content-body" class="form-label field-label">DESCRIPTION</label>
    <textarea class="form-control rounded-3"
              [class.is-invalid]="bodyInput.invalid && bodyInput.touched"
              id="content-body"
              name="body"
              #bodyInput="ngModel"
              required
              rows="3"
              placeholder="This week we cover the fundamentals..."
              [(ngModel)]="body"
              [disabled]="isSubmitting">
    </textarea>
    <div class="invalid-feedback text-danger small mt-1" *ngIf="bodyInput.invalid && bodyInput.touched">
      This field is required.
    </div>
  </div>

  <!-- ATTACHMENTS -->
  <div class="mb-3">
    <label class="form-label field-label">ATTACHMENTS</label>

    <!-- Hidden file input -->
    <input type="file"
           #fileInput
           accept=".pdf,.mp4"
           multiple
           class="d-none"
           id="file-input"
           (change)="onFilesSelected($event)">

    <!-- Upload Zone -->
    <div class="upload-zone"
         role="button"
         tabindex="0"
         aria-label="Click to select PDF or MP4 files"
         (click)="fileInput.click()"
         (keydown.enter)="fileInput.click()"
         [class.upload-zone-disabled]="isSubmitting">
      <i class="bi bi-cloud-upload upload-zone-icon"></i>
      <div class="upload-zone-text">Click to upload or drag and drop</div>
      <div class="upload-zone-hint">PDF, MP4 (Max. 500MB)</div>
    </div>

    <!-- Staged Files List -->
    <div *ngIf="stagedFiles.length > 0" class="file-list mt-3">
      <div *ngFor="let f of stagedFiles; let i = index" class="file-row">
        <i [class]="getFileIcon(f.mimeType) + ' fs-5'"></i>
        <span class="file-name text-truncate">{{ f.name }}</span>
        <span class="file-size">{{ formatSize(f.size) }}</span>
        <button type="button"
                class="btn btn-link btn-sm p-0 text-secondary ms-2 file-remove-btn"
                [attr.aria-label]="'Remove ' + f.name"
                (click)="removeFile(i)">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Progress Bar -->
  <div *ngIf="isSubmitting" class="progress upload-progress mt-3" role="progressbar"
       aria-label="Upload in progress" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100">
    <div class="progress-bar progress-bar-striped progress-bar-animated bg-lms-primary w-100"></div>
  </div>

</div>

<!-- ── Modal Footer ───────────────────────────────────────────── -->
<div class="modal-footer border-top px-4 py-3 gap-2">
  <button type="button"
          class="btn-cancel-modal"
          id="btn-cancel-add"
          [disabled]="isSubmitting"
          (click)="cancel()">
    Cancel
  </button>

  <button type="button"
          class="btn-save-modal"
          id="btn-save-content"
          [disabled]="isSubmitting"
          (click)="submit(titleInput, bodyInput)">
    <span *ngIf="!isSubmitting">Save Content</span>
    <span *ngIf="isSubmitting"><i class="spinner-border spinner-border-sm me-1"></i>Saving…</span>
  </button>
</div>
