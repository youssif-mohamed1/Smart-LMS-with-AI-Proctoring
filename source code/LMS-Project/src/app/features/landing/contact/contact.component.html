<div class="contact-wrapper py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="contact-glass p-5 shadow-lg">
          <div class="row">
            <div class="col-md-5 bg-dark text-white p-5 rounded-4 mb-4 mb-md-0">
              <h3>Contact Info</h3>
              <p class="text-white-50">Reach out to us for any technical support.</p>
              <div class="mt-4">
                <p><i class="bi bi-geo-alt me-2 text-primary"></i> Cairo, Egypt</p>
                <p><i class="bi bi-envelope me-2 text-primary"></i> support&#64;lumina.edu</p>
                <p><i class="bi bi-telephone me-2 text-primary"></i> +20 123 456 789</p>
              </div>
            </div>
            <div class="col-md-7 ps-md-5">
              <form>
                <div class="mb-3">
                  <label class="form-label">Full Name</label>
                  <input type="text" class="form-control" placeholder="Enter your name">
                </div>
                <div class="mb-3">
                  <label class="form-label">Message</label>
                  <textarea class="form-control" rows="4" placeholder="How can we help?"></textarea>
                </div>
                <button class="btn btn-primary w-100 py-3 mt-3">Send Message</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
